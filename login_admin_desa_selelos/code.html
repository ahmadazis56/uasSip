<body class="min-h-screen flex flex-col items-center justify-center p-margin-mobile md:p-margin-desktop relative overflow-hidden">
<!-- Atmospheric Background Elements -->
<div class="absolute inset-0 z-0 pointer-events-none">
<div class="absolute top-[-10%] right-[-10%] w-[500px] h-[500px] bg-primary/5 rounded-full blur-[100px]"></div>
<div class="absolute bottom-[-10%] left-[-10%] w-[600px] h-[600px] bg-secondary/5 rounded-full blur-[120px]"></div>
</div>
<!-- Main Login Canvas -->
<main class="w-full max-w-md z-10">
<div class="bg-surface-container-lowest p-8 md:p-10 rounded-xl shadow-[0px_4px_20px_rgba(6,95,70,0.08)] border border-outline-variant flex flex-col items-center gap-8">
<!-- Logo Section -->
<div class="flex flex-col items-center gap-2">
<div class="w-20 h-20 bg-primary-container/10 rounded-full flex items-center justify-center mb-2 overflow-hidden border border-primary/20">
<img alt="Logo Desa Selelos" class="w-full h-full object-cover" data-alt="A minimalist and elegant emblem for a tropical village called Desa Selelos, featuring a stylized forest green mountain and waterfall icon on a pristine white background. The design is modern, using clean vector lines and a professional corporate aesthetic. Soft natural light illuminates the logo, creating a welcoming and dependable atmosphere that represents sustainable tourism and natural heritage." src="https://lh3.googleusercontent.com/aida/AP1WRLv_sh27OeTPdGb7AIVSNj4QGHCW8hLVpZ35KoP4fVkotPBc_QjWrdpEGeQyVZvB7icrHwYhXFjwIUhWSXALyfhVP8MiDGND25ioTnAM3mxMjUFE1tqaWjBQCyGdtiS8kcuCfSusMy0QNqFD-pgMb0ZGsPkHriZuWIDFIvdk7OQfHzs9QxhJzpnS9LqIIZt9VCbSKxsanXxdNlSKcHOt6EBuxnntVWVm5UoHqQSn2Ew1kZ2y4z_rAiGdkUI"/>
</div>
<h1 class="font-display-lg-mobile text-display-lg-mobile text-primary tracking-tight">Desa Selelos</h1>
<p class="font-body-main text-body-main text-on-surface-variant">Portal Administrasi Sistem</p>
</div>
<!-- Login Form -->
<form class="w-full space-y-6" onsubmit="return false">
<div class="space-y-2">
<label class="font-label-bold text-label-bold text-on-surface" for="username">Username</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-secondary transition-colors" data-icon="person">person</span>
<input class="w-full pl-12 pr-4 py-3 bg-white border border-outline-variant rounded-lg font-body-main text-body-main focus:ring-2 focus:ring-secondary/20 focus:border-secondary transition-all outline-none" id="username" name="username" placeholder="Masukkan username admin" type="text"/>
</div>
</div>
<div class="space-y-2">
<label class="font-label-bold text-label-bold text-on-surface" for="password">Password</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-secondary transition-colors" data-icon="lock">lock</span>
<input class="w-full pl-12 pr-12 py-3 bg-white border border-outline-variant rounded-lg font-body-main text-body-main focus:ring-2 focus:ring-secondary/20 focus:border-secondary transition-all outline-none" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<div class="flex items-center justify-between">
<label class="flex items-center gap-2 cursor-pointer group">
<input class="w-4 h-4 rounded border-outline-variant text-primary focus:ring-primary/20" type="checkbox"/>
<span class="font-caption text-caption text-on-surface-variant group-hover:text-on-surface">Ingat saya</span>
</label>
<a class="font-caption text-caption text-secondary hover:underline transition-all" href="#">Lupa password?</a>
</div>
<button class="w-full bg-primary-container text-on-primary-container py-4 rounded-lg font-label-bold text-label-bold shadow-sm hover:brightness-110 active:scale-[0.98] transition-all duration-150 flex items-center justify-center gap-2" type="submit">
                    Masuk
                    <span class="material-symbols-outlined" data-icon="login">login</span>
</button>
</form>
<div class="pt-4 border-t border-outline-variant w-full text-center">
<p class="font-caption text-caption text-on-surface-variant">
                    Butuh bantuan akses? <a class="text-primary font-bold hover:underline" href="#">Hubungi IT Support</a>
</p>
</div>
</div>
<!-- Back to Public Site Link -->
<div class="mt-8 text-center">
<a class="inline-flex items-center gap-2 font-body-main text-body-main text-on-surface-variant hover:text-primary transition-colors group" href="#">
<span class="material-symbols-outlined text-[18px] transition-transform group-hover:-translate-x-1" data-icon="arrow_back">arrow_back</span>

<footer class="mt-auto w-full py-12 px-margin-mobile md:px-margin-desktop max-w-container-max mx-auto grid grid-cols-1 md:grid-cols-3 gap-gutter opacity-60">

<div class="flex flex-wrap gap-4 justify-end">
<a class="font-caption text-caption text-on-surface-variant hover:text-primary transition-colors" href="#">Kebijakan Privasi</a>
<a class="font-caption text-caption text-on-surface-variant hover:text-primary transition-colors" href="#">Hubungi Kami</a>
</div>
</footer>
<script>
        // Micro-interactions for login button and visibility toggle
        document.querySelector('form').addEventListener('submit', function(e) {
            const btn = this.querySelector('button[type="submit"]');
            const originalContent = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin" data-icon="progress_activity">progress_activity</span> Memproses...';
            
            setTimeout(() => {
                btn.innerHTML = originalContent;
                btn.disabled = false;
                alert('Sistem sedang dalam pengembangan. Mohon hubungi administrator.');
            }, 1500);
        });

        const togglePassword = document.querySelector('button[type="button"]');
        const passwordInput = document.querySelector('#password');
        togglePassword.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            const icon = togglePassword.querySelector('.material-symbols-outlined');
            icon.textContent = type === 'password' ? 'visibility' : 'visibility_off';
        });
    </script>
